<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HatsOff</title>
  <link rel="icon" type="image/svg+xml" href="/static/hatsoff-mark.svg" />
  <link rel="stylesheet" href="/static/styles.css?v=stepload2" />
  <script src="/static/marked.min.js"></script>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <button type="button" class="new-chat" id="btn-new" title="New chat">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span>New chat</span>
        </button>
        <label class="search-wrap">
          <span class="visually-hidden">Search chats</span>
          <input type="search" id="search" placeholder="Search chats" autocomplete="off" />
        </label>
      </div>

      <div class="sidebar-section-label">Chats</div>
      <nav class="chat-list" id="chat-list" aria-label="Conversations"></nav>

      <div class="sidebar-footer">
        <button type="button" class="profile-row" id="btn-settings" title="Settings">
          <img class="avatar avatar-img" src="/static/hatsoff-mark.svg" alt="" width="28" height="28" />
          <div class="profile-meta">
            <div class="profile-name">HatsOff</div>
            <div class="profile-sub" id="env-label">Kali-ready · Settings</div>
          </div>
          <svg class="gear" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="1.6"/>
            <path d="M19.4 13a7.8 7.8 0 0 0 .1-2l2-1.2-2-3.4-2.3.6a7.6 7.6 0 0 0-1.7-1L15 3h-4l-.5 2.9a7.6 7.6 0 0 0-1.7 1L6.5 6.4l-2 3.4 2 1.2a7.8 7.8 0 0 0 0 2l-2 1.2 2 3.4 2.3-.6a7.6 7.6 0 0 0 1.7 1L11 21h4l.5-2.9a7.6 7.6 0 0 0 1.7-1l2.3.6 2-3.4-2-1.2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button type="button" class="icon-btn mobile-only" id="btn-menu" aria-label="Open sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>

        <div class="model-picker">
          <select id="provider" aria-label="Provider"></select>
          <span class="picker-sep">/</span>
          <select id="model" aria-label="Model"></select>
        </div>

        <div class="topbar-actions">
          <button type="button" class="icon-btn" id="btn-settings-top" title="Settings" aria-label="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="1.6"/>
              <path d="M19.4 13a7.8 7.8 0 0 0 .1-2l2-1.2-2-3.4-2.3.6a7.6 7.6 0 0 0-1.7-1L15 3h-4l-.5 2.9a7.6 7.6 0 0 0-1.7 1L6.5 6.4l-2 3.4 2 1.2a7.8 7.8 0 0 0 0 2l-2 1.2 2 3.4 2.3-.6a7.6 7.6 0 0 0 1.7 1L11 21h4l.5-2.9a7.6 7.6 0 0 0 1.7-1l2.3.6 2-3.4-2-1.2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            </svg>
          </button>
          <button type="button" class="icon-btn" id="btn-delete" title="Delete chat" aria-label="Delete chat">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M4 7h16M10 11v6M14 11v6M6 7l1 12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-12M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </header>

      <section class="thread" id="thread" aria-live="polite"></section>

      <footer class="composer-wrap">
        <form class="composer" id="composer-form">
          <textarea id="prompt" rows="1" placeholder="Ask HatsOff anything…" required></textarea>
          <button type="submit" class="send-btn" id="btn-send" aria-label="Send message" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </form>
        <p class="disclaimer">HatsOff is built for Kali Linux labs — review before Run. Chats stay on this device.</p>
      </footer>
    </main>

    <div class="sidebar-backdrop" id="sidebar-backdrop" hidden></div>

    <div class="modal-backdrop" id="settings-backdrop" hidden>
      <div class="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <header class="settings-header">
          <h2 id="settings-title">Settings</h2>
          <button type="button" class="icon-btn" id="btn-settings-close" aria-label="Close settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
        </header>
        <p class="settings-intro">Configure providers here — no <code>.env</code> required. Keys are stored in the local HatsOff config file.</p>
        <div class="settings-defaults">
          <label>
            <span>Default provider</span>
            <select id="settings-default-provider"></select>
          </label>
        </div>
        <div class="settings-providers" id="settings-providers"></div>
        <footer class="settings-footer">
          <p class="settings-path" id="settings-path"></p>
          <div class="settings-actions">
            <button type="button" class="btn-secondary" id="btn-settings-cancel">Cancel</button>
            <button type="button" class="btn-primary-solid" id="btn-settings-save">Save</button>
          </div>
        </footer>
        <p class="settings-status" id="settings-status" hidden></p>
      </div>
    </div>

    <div class="modal-backdrop" id="inputs-backdrop" hidden>
      <div class="settings-modal inputs-modal" role="dialog" aria-modal="true" aria-labelledby="inputs-title">
        <header class="settings-header">
          <h2 id="inputs-title">Inputs needed</h2>
          <button type="button" class="icon-btn" id="btn-inputs-close" aria-label="Close">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
          </button>
        </header>
        <p class="settings-intro" id="inputs-intro">HatsOff needs a few values before running this lab script.</p>
        <form id="inputs-form" class="inputs-form"></form>
        <footer class="settings-footer">
          <div class="settings-actions">
            <button type="button" class="btn-secondary" id="btn-inputs-cancel">Cancel</button>
            <button type="submit" form="inputs-form" class="btn-primary-solid" id="btn-inputs-continue">Continue</button>
          </div>
        </footer>
      </div>
    </div>
  </div>
  <script src="/static/app.js?v=streamretry1"></script>
</body>
</html>
